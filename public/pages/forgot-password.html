<!DOCTYPE html>
<!--
  Page:    forgot-password.html
  Feature: Password reset request
  CSS:     variables.css → forgot-password.css
  JS:      api.js (no nav.js — unauthenticated)

  TODO backend:
  - "Send Reset Link" btn: api.forgotPassword(email)
  - Show success message on response
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BVETTER - Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <!-- 1. Design tokens (ALWAYS first) -->
  <link rel="stylesheet" href="../css/variables.css"/>
  <!-- 2. Page-specific -->
  <link rel="stylesheet" href="../css/forgot-password.css"/>
</head>
<body>

  <div class="page-wrapper">

    <img src="../images/backgrounds/green-bg.png" alt="" class="bg-image"/>
    <img src="../images/logos/logo-white.png" alt="Baliwag City Veterinary Services" class="top-logo"/>

    <div class="card">
      <img src="../images/icons/icon-reset.svg" alt="" class="card-icon"/>

      <h2>Reset Your Password</h2>
      <p class="card-subtitle">Enter your email address and we will send you a link to reset your password.</p>

      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <img src="../images/icons/icon-email.svg" alt="" class="input-icon"/>
          <!-- TODO backend: POST to /api/auth/forgot-password -->
          <input type="email" id="resetEmail" name="email" placeholder="your@email.com" autocomplete="email"/>
        </div>
      </div>

      <!-- TODO backend: replace onclick with form submit -->
      <button class="btn-send">Send Reset Link</button>

      <a href="login.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back to Login
      </a>
    </div>

  </div>
  <!-- ══ SCRIPTS — unauthenticated page ══ -->
  <script src="../js/api.js"></script>
  <script src="../js/forgot-password.js"></script>
</body>
</html>

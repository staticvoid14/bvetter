<!DOCTYPE html>
<!--
  Page:    login.html
  Feature: User authentication
  CSS:     variables.css → login.css
  JS:      login.js

  TODO backend:
  - handleLogin(): replace mock with api.login(email, password)
  - Save response.token to sessionStorage on success
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BVETTER - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <!-- 1. Design tokens -->
  <link rel="stylesheet" href="../css/variables.css"/>
  <!-- 2. Page-specific (login has no navbar so no components.css needed) -->
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>
  <div class="page-wrapper">
    <!-- Left: green background panel -->
    <div class="left-panel">
      <img src="../images/logos/logo-white.png" alt="Baliwag City Veterinary Services" class="left-logo"/>
      <img src="../images/backgrounds/green-bg.png" alt="" class="bg-image"/>
      <div class="left-content">
        <h1>Keep your pets<br/>healthy and<br/>happy</h1>
        <p>BOOK APPOINTMENTS, VIEW RECORDS, AND TRACK YOUR PET'S WELLNESS JOURNEY.</p>
      </div>
      <div class="cross-deco cross-1">+</div>
      <div class="cross-deco cross-2">+</div>
    </div>

    <!-- Right: login form -->
    <div class="right-panel">
      <div class="form-container">
        <img src="../images/logos/logo-color.png" alt="Baliwag City Veterinary Services" class="right-logo"/>
        <h2>Welcome Back!</h2>
        <p class="subtitle">Enter your credentials to access your account.</p>

        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <div class="input-wrapper">
            <img src="../images/icons/icon-email.svg" alt="" class="input-icon"/>
            <input type="email" id="loginEmail" name="email" placeholder="your@email.com" autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label>PASSWORD</label>
          <div class="input-wrapper">
            <img src="../images/icons/icon-password.svg" alt="" class="input-icon"/>
            <input type="password" id="loginPassword" name="password" placeholder="••••••••••••" autocomplete="current-password"/>
            <img src="../images/icons/icon-eye.svg" alt="Show password" class="toggle-pw" onclick="togglePassword()"/>
          </div>
          <div class="forgot-row">
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
          </div>
        </div>

        <!-- TODO backend: replace onclick with api.login() call -->
        <button class="btn-login" onclick="handleLogin()">
          Login
          <img src="../images/icons/icon-arrow-right.png" alt="" class="btn-icon"/>
        </button>

        <p class="signup-text">New to the clinic? <a href="create-account.html" class="signup-link">Sign up</a></p>
      </div>
    </div>
  </div>

  <!-- ══ NOTICE MODAL — replaces browser alert() ══ -->
  <div class="modal-overlay" id="noticeModal" onclick="closeModalOutside(event,'noticeModal')">
    <div class="modal-box narrow notice-box" role="alertdialog" aria-modal="true" aria-labelledby="noticeMessage">
      <div class="notice-icon" id="noticeIcon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="#0FA82E" stroke-width="1.8"/>
          <rect x="11.1" y="6.5" width="1.8" height="7" rx="0.9" fill="#0FA82E"/>
          <rect x="11.1" y="15.5" width="1.8" height="1.8" rx="0.9" fill="#0FA82E"/>
        </svg>
      </div>
      <p class="notice-message" id="noticeMessage"></p>
      <button class="notice-ok-btn" onclick="closeModal('noticeModal')">Got it</button>
    </div>
  </div>

  <!-- ══ SCRIPTS — unauthenticated page ══ -->
<script src="../../shared/js/auth.js"></script>  <!-- ← ADD THIS -->
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
</body>
</html>

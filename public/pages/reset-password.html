<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VBetter – Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            background: #f0faf2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .rp-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }

        .rp-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .rp-logo-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00B928;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rp-logo span {
            font-weight: 800;
            font-size: 18px;
            color: #111;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #111;
            margin-bottom: 6px;
        }

        .rp-sub {
            font-size: 13px;
            color: #777;
            margin-bottom: 28px;
        }

        .rp-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .rp-input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .rp-input {
            width: 100%;
            height: 44px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            padding: 0 44px 0 14px;
            font-family: inherit;
            font-size: 14px;
            color: #111;
            outline: none;
            transition: border-color .2s;
        }

        .rp-input:focus { border-color: #00B928; }

        .rp-eye {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            padding: 2px;
            display: flex;
            align-items: center;
        }

        .rp-btn {
            width: 100%;
            height: 46px;
            background: #00B928;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .5px;
            margin-top: 8px;
            transition: background .2s;
        }

        .rp-btn:hover { background: #00a022; }
        .rp-btn:disabled { background: #aaa; cursor: not-allowed; }

        .rp-msg {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .rp-msg.success { background: #e6faea; color: #00802c; border: 1px solid #b3e6be; }
        .rp-msg.error   { background: #fef2f2; color: #c0392b; border: 1px solid #f5c6c6; }

        .rp-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #00B928;
            font-weight: 600;
            text-decoration: none;
        }

        .rp-back:hover { text-decoration: underline; }

        .rp-strength {
            height: 4px;
            border-radius: 2px;
            background: #eee;
            margin-top: 6px;
            overflow: hidden;
        }

        .rp-strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width .3s, background .3s;
        }
    </style>
</head>
<body>

<div class="rp-card">
    <div class="rp-logo">
        <div class="rp-logo-circle">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <span>VBetter</span>
    </div>

    <h1>Set New Password</h1>
    <p class="rp-sub">Enter and confirm your new password below.</p>

    <label class="rp-label" for="rp-new">New Password</label>
    <div class="rp-input-wrap">
        <input class="rp-input" type="password" id="rp-new" placeholder="Minimum 8 characters" autocomplete="new-password">
        <button class="rp-eye" type="button" onclick="toggleEye('rp-new', this)" aria-label="Show/hide password">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
        <div class="rp-strength"><div class="rp-strength-bar" id="rp-strength-bar"></div></div>
    </div>

    <label class="rp-label" for="rp-confirm">Confirm Password</label>
    <div class="rp-input-wrap">
        <input class="rp-input" type="password" id="rp-confirm" placeholder="Repeat new password" autocomplete="new-password">
        <button class="rp-eye" type="button" onclick="toggleEye('rp-confirm', this)" aria-label="Show/hide password">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>

    <button class="rp-btn" id="rp-submit" type="button">RESET PASSWORD</button>

    <div class="rp-msg" id="rp-msg"></div>
    <a class="rp-back" href="/Final-backend(VBETTER)/Final-Backend/public/pages/login.html">← Back to Login</a>
</div>

<script>
    /* ── password strength ── */
    document.getElementById('rp-new').addEventListener('input', function () {
        const val = this.value;
        const bar = document.getElementById('rp-strength-bar');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colours = ['', '#e74c3c', '#f39c12', '#2ecc71', '#00B928'];
        const widths  = ['0%', '25%', '50%', '75%', '100%'];
        bar.style.width      = widths[score]   || '0%';
        bar.style.background = colours[score]  || 'transparent';
    });

    /* ── eye toggle ── */
    function toggleEye(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    /* ── submit ── */
    document.getElementById('rp-submit').addEventListener('click', async () => {
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token') || '';
        const password = document.getElementById('rp-new').value;
        const confirm  = document.getElementById('rp-confirm').value;
        const msgEl    = document.getElementById('rp-msg');
        const btn      = document.getElementById('rp-submit');

        msgEl.style.display = 'none';
        msgEl.className     = 'rp-msg';

        if (!token) {
            showMsg('error', 'Invalid or missing reset token.');
            return;
        }
        if (password.length < 8) {
            showMsg('error', 'Password must be at least 8 characters.');
            return;
        }
        if (password !== confirm) {
            showMsg('error', 'Passwords do not match.');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Updating…';

        try {
            const body = new FormData();
            body.append('action',   'reset_password');
            body.append('token',    token);
            body.append('password', password);
            body.append('confirm',  confirm);

          const res = await fetch(
    '/Final-backend(VBETTER)/Final-Backend/backend/admin/verify-contact.php',
    {
        method: 'POST',
        body
    }
);
            const data = await res.json();

            if (data.success) {
                showMsg('success', data.message + ' Redirecting to login…');
                setTimeout(() => { window.location.href = '/Final-backend(VBETTER)/Final-Backend/public/pages/login.html'; }, 2500);
            } else {
                showMsg('error', data.message || 'Failed to reset password.');
            }
        } catch {
            showMsg('error', 'Network error. Please try again.');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'RESET PASSWORD';
        }
    });

    function showMsg(type, text) {
        const el = document.getElementById('rp-msg');
        el.className     = 'rp-msg ' + type;
        el.textContent   = text;
        el.style.display = 'block';
    }
</script>
</body>
</html>

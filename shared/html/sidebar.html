<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  VBetter — Shared Sidebar Component                         ║
  ║  File: shared/components/sidebar.html                       ║
  ║                                                              ║
  ║  HOW TO USE                                                  ║
  ║  1. Copy the <aside class="sidebar"> block into your page.  ║
  ║  2. Load scripts in this order (bottom of <body>):          ║
  ║       <script src="/shared/js/auth.js"></script>            ║
  ║       <script src="/shared/js/sidebar.js"></script>         ║
  ║  3. sidebar.js reads the session role and auto-hides items  ║
  ║     marked data-roles="admin" from non-admin users.         ║
  ║                                                              ║
  ║  data-roles="vet admin"  → both roles see it                ║
  ║  data-roles="admin"      → admin only                       ║
  ║  (no attribute)          → everyone                         ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<aside class="sidebar" role="navigation" aria-label="Main navigation">

    <!-- Logo -->
    <div class="sidebar-header">
        <div class="logo">
            <img src="/shared/images/logo.png" alt="VBetter logo"
                 onerror="this.parentElement.textContent='V'">
        </div>
    </div>

    <!-- Nav items -->
    <nav class="sidebar-nav">

        <!-- ── VET SECTION (vet + admin both see these) ── -->
        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/home.svg" alt="">
            <span class="nav-label">Dashboard</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/calendar.svg" alt="">
            <span class="nav-label">Appointment Management</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/paw.svg" alt="">
            <span class="nav-label">Patient Records</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/n.svg" alt="">
            <span class="nav-label">Report</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/graph.svg" alt="">
            <span class="nav-label">Disease Analytics</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/lost-and-found.svg" alt="">
            <span class="nav-label">Lost and Found</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/chatbot.svg" alt="">
            <span class="nav-label">Chatbot Management</span>
        </a>

        <a class="nav-item" href="#" data-roles="vet admin">
            <img class="nav-icon" src="/vet/images/vaccine.svg" alt="">
            <span class="nav-label">Mass Vaccination</span>
        </a>

        <!-- ── ADMIN-ONLY SECTION ─────────────────────── -->
        <hr class="nav-section-divider" data-roles="admin">
        <p class="nav-section-label" data-roles="admin">Administration</p>

        <a class="nav-item admin-item" href="#" data-roles="admin">
            <img class="nav-icon" src="/shared/images/icons/user-manage.svg" alt="">
            <span class="nav-label">Account Management</span>
        </a>

        <a class="nav-item admin-item" href="#" data-roles="admin">
            <img class="nav-icon" src="/shared/images/icons/settings.svg" alt="">
            <span class="nav-label">Website Management</span>
        </a>

    </nav>

    <!-- Profile card — populated by sidebar.js from session -->
    <div class="sidebar-footer">
        <!-- sidebar.js injects the profile card here -->
    </div>

</aside>
